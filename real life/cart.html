<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeRoute - Your Cart</title>
    <link rel="stylesheet" href="home.css">
    <style>
        .cart-container {
            max-width: 900px;
            margin: 80px auto;
            padding: 20px;
        }

        .cart-header {
            font-size: 36px;
            color: #f8fafc;
            margin-bottom: 30px;
            text-align: center;
        }

        .cart-items {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }

        .item-details {
            flex-grow: 1;
            margin-left: 20px;
        }

        .item-title {
            font-size: 20px;
            color: #f8fafc;
            margin-bottom: 5px;
        }

        .item-baker {
            font-size: 14px;
            color: #cbd5e1;
        }

        .item-price {
            font-size: 18px;
            font-weight: bold;
            color: #38bdf8;
            margin: 0 20px;
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .qty-btn:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        .cart-summary {
            margin-top: 30px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            text-align: right;
            backdrop-filter: blur(10px);
        }

        .summary-total {
            font-size: 24px;
            color: #f8fafc;
            margin-bottom: 20px;
        }

        .summary-total span {
            color: #38bdf8;
            font-weight: bold;
        }

        .checkout-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .checkout-btn:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="logo.png.jpg" alt="BakeRoute Logo" class="logo-img">
            </div>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="browse cakes.html">Browse Cakes</a></li>
                <li><a href="bakers.html">Bakers</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <div class="btn">
                <button onclick="window.location.href='index.html'">Sign In</button>
                <button onclick="window.location.href='index.html'">Sign Up</button>
            </div>
            <div class="location">📍 Kampala</div>
        </nav>
    </header>

    <main class="cart-container">
        <h1 class="cart-header">Your Cart</h1>

        <div class="cart-items">
            <div class="cart-item">
                <img src="cake1.jfif" alt="Cupcakes">
                <div class="item-details">
                    <div class="item-title">Assorted Cupcakes (6pcs)</div>
                    <div class="item-baker">Baker: Sarah's Sweets</div>
                </div>
                <div class="item-quantity">
                    <button class="qty-btn">-</button>
                    <span>1</span>
                    <button class="qty-btn">+</button>
                </div>
                <div class="item-price">UGX 32,000</div>
            </div>

            <div class="cart-item">
                <img src="cake2.jfif" alt="Red Velvet">
                <div class="item-details">
                    <div class="item-title">Red Velvet Birthday Cake</div>
                    <div class="item-baker">Baker: John The Baker</div>
                </div>
                <div class="item-quantity">
                    <button class="qty-btn">-</button>
                    <span>1</span>
                    <button class="qty-btn">+</button>
                </div>
                <div class="item-price">UGX 55,000</div>
            </div>
        </div>

        <div class="cart-summary">
            <div class="summary-total">Total: <span>UGX 87,000</span></div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </main>
</body>

</html>
